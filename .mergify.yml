queue_rules:
  - name: default
    max_checks_retries: 10
    merge_method: squash
    commit_message_template: |
      {{ title }} (#{{ number }})
        
      {{ body }}

pull_request_rules:
  - name: automatic merge for main when CI passes
    conditions:
      - base=main
      - or:
          - label=ready-to-merge
          - label=dependencies
    actions:
      queue:
        name: default

