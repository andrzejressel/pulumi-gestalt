type: Added
title: Migrate pulumi-language-rust Go host into pulumi-gestalt
description: |
  Added a new `pulumi-language-rust` component in this repository by migrating the Go host,
  Go-to-Rust bridge, AST/protobuf conversion layer, and Rust language conformance test suite
  from `pulumi-rust`.

  The migration includes additive build/test/package commands, a dedicated CI conformance job,
  and release artifact publishing for native runner targets (Linux x86_64, macOS arm64,
  Windows x86_64).
