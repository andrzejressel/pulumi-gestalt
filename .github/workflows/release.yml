name: Release
on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "full"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Cleanup unused stuff
        run: |
          df -h /
          sudo rm -rf \
          "$AGENT_TOOLSDIRECTORY" \
          /opt/google/chrome \
          /opt/microsoft/msedge \
          /opt/microsoft/powershell \
          /opt/pipx \
          /usr/lib/mono \
          /usr/local/julia* \
          /usr/local/lib/android \
          /usr/local/lib/node_modules \
          /usr/local/share/chromium \
          /usr/local/share/powershell \
          /usr/share/dotnet \
          /usr/share/swift
          df -h /
      - name: Deployer app access token
        id: deployer_app
        uses: getsentry/action-github-app-token@v2
        with:
          app_id: ${{ secrets.DEPLOYER_APP_ID }}
          private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          token: ${{ steps.deployer_app.outputs.token }}
          fetch-depth: '0'
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          shared-key: build-examples
          save-if: false

      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
      - name: Install requirements
        run: just install-requirements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull required docker images
        if: runner.os == 'Linux'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 10
          command: docker pull public.ecr.aws/ubuntu/ubuntu:latest
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '^1.22.0'
          cache-dependency-path: "**/go.sum"
      - run: go version
      - run: pulumi login --local

      - name: Replace version
        run: just update-version "0.0.0.0-test"

#      - name: Base and e2e tests
#        run: just base-ci-flow native-ci-flow wasm-ci-flow c-ci-flow
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git name and email
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push version change
        run: |
          git add -A
          git commit -m "Update version to 0.0.0.0-test"

      - name: Generate new changelog
        run: |
          just changelog-generate-for-repo "0.0.0.0-test"

      - name: Copy changelog to new version directory
        run: |
          mv .changelog/unreleased .changelog/0.0.0.0-test
          rm .changelog/0.0.0.0-test/.gitkeep
          mkdir .changelog/unreleased
          touch .changelog/unreleased/.gitkeep

      - name: Commit changes
        run: |
          git add -A
          git commit -m "Update changelog for version 0.0.0.0-test"

      - name: Create commit
        run: |
          git commit --allow-empty -m "Release v0.0.0.0-test"
          git tag "v0.0.0.0-test"
          git push origin "v0.0.0.0-test"
          git revert HEAD~2 # Revert renaming
          git commit --amend -m "Restore version to 0.0.0-DEV"
          git push main

#      - name: Release
#        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
